<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chrome Dino</title>
    <style>
        * { margin: 0; padding: 0; }
        html, body {
            width: 100%;
            height: 100%;
            background: #f7f7f7;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .interstitial-wrapper {
            background: #f7f7f7;
        }
        .runner-container {
            width: 1200px;
            height: 300px;
            background: #f7f7f7;
            position: relative;
        }
        .runner-canvas {
            width: 1200px;
            height: 300px;
            background: #f7f7f7;
            image-rendering: pixelated;
        }
        #offline-resources { display: none; }
    </style>
</head>
<body>
    <div id="main-frame-error" class="interstitial-wrapper">
        <img class="icon icon-offline" style="visibility: hidden;">
        <div class="runner-container">
            <canvas class="runner-canvas" width="1200" height="300"></canvas>
        </div>
    </div>
    <div id="offline-resources">
        <div id="offline-resources-1x">
            <img id="1x-obstacle-large" src="img/1x-obstacle-large.png">
            <img id="1x-obstacle-small" src="img/1x-obstacle-small.png">
            <img id="1x-cloud" src="img/1x-cloud.png">
            <img id="1x-text" src="img/1x-text.png">
            <img id="1x-horizon" src="img/1x-horizon.png">
            <img id="1x-trex" src="img/1x-trex.png">
            <img id="1x-restart" src="img/1x-restart.png">
        </div>
        <div id="offline-resources-2x">
            <img id="2x-obstacle-large" src="img/2x-obstacle-large.png">
            <img id="2x-obstacle-small" src="img/2x-obstacle-small.png">
            <img id="2x-cloud" src="img/2x-cloud.png">
            <img id="2x-text" src="img/2x-text.png">
            <img id="2x-horizon" src="img/2x-horizon.png">
            <img id="2x-trex" src="img/2x-trex.png">
            <img id="2x-restart" src="img/2x-restart.png">
        </div>
    </div>

    <script>
    (function() {
        'use strict';
        var DEFAULT_WIDTH = 600;
        var FPS = 60;
        var IS_HIDPI = window.devicePixelRatio > 1;
        var IS_MOBILE = window.navigator.userAgent.indexOf('Mobi') > -1;
        var IS_TOUCH_ENABLED = 'ontouchstart' in window;

        Runner.config = {
            ACCELERATION: 0.001,
            BG_CLOUD_SPEED: 0.2,
            BOTTOM_PAD: 10,
            CLEAR_TIME: 3000,
            CLOUD_FREQUENCY: 0.5,
            GAMEOVER_CLEAR_TIME: 750,
            GAP_COEFFICIENT: 0.6,
            GRAVITY: 0.6,
            INITIAL_JUMP_VELOCITY: 12,
            MAX_CLOUDS: 6,
            MAX_OBSTACLE_LENGTH: 3,
            MAX_SPEED: 12,
            MIN_JUMP_HEIGHT: 35,
            MOBILE_SPEED_COEFFICIENT: 1.2,
            RESOURCE_TEMPLATE_ID: 'audio-resources',
            SPEED: 6,
            SPEED_DROP_COEFFICIENT: 3
        };

        Runner.defaultDimensions = {
            WIDTH: DEFAULT_WIDTH,
            HEIGHT: 150
        };

        Runner.classes = {
            CANVAS: 'runner-canvas',
            CONTAINER: 'runner-container',
            CRASHED: 'crashed',
            ICON: 'icon-offline',
            TOUCH_CONTROLLER: 'controller'
        };

        Runner.imageSources = {
            LDPI: [{ name: 'CACTUS_LARGE', id: '1x-obstacle-large' }, { name: 'CACTUS_SMALL', id: '1x-obstacle-small' }, { name: 'CLOUD', id: '1x-cloud' }, { name: 'HORIZON', id: '1x-horizon' }, { name: 'RESTART', id: '1x-restart' }, { name: 'TEXT_SPRITE', id: '1x-text' }, { name: 'TREX', id: '1x-trex' }],
            HDPI: [{ name: 'CACTUS_LARGE', id: '2x-obstacle-large' }, { name: 'CACTUS_SMALL', id: '2x-obstacle-small' }, { name: 'CLOUD', id: '2x-cloud' }, { name: 'HORIZON', id: '2x-horizon' }, { name: 'RESTART', id: '2x-restart' }, { name: 'TEXT_SPRITE', id: '2x-text' }, { name: 'TREX', id: '2x-trex' }]
        };

        Runner.sounds = { PRESS: 'offline-sound-press', HIT: 'offline-sound-hit', REACHED: 'offline-sound-reached' };

        function Runner(outerContainerId, opt_config) {
            if (Runner.instance_) return Runner.instance_;
            Runner.instance_ = this;
            this.outerContainerEl = document.querySelector(outerContainerId);
            this.containerEl = null;
            this.config = opt_config || Runner.config;
            this.dimensions = Runner.defaultDimensions;
            this.canvas = null;
            this.canvasCtx = null;
            this.tRex = null;
            this.distanceMeter = null;
            this.distanceRan = 0;
            this.highestScore = 0;
            this.time = 0;
            this.runningTime = 0;
            this.msPerFrame = 1000 / FPS;
            this.currentSpeed = this.config.SPEED;
            this.obstacles = [];
            this.started = false;
            this.activated = false;
            this.crashed = false;
            this.paused = false;
            this.resizeTimerId_ = null;
            this.playCount = 0;
            this.audioBuffer = null;
            this.soundFx = {};
            this.audioContext = null;
            this.images = {};
            this.imagesLoaded = 0;
            this.loadImages();
        }
        window['Runner'] = Runner;

        Runner.prototype = {
            loadImages: function() {
                var self = this;
                var imageSources = IS_HIDPI ? Runner.imageSources.HDPI : Runner.imageSources.LDPI;
                var numImages = imageSources.length;
                var imagesLoaded = 0;
                for (var i = numImages - 1; i >= 0; i--) {
                    var imgSource = imageSources[i];
                    var img = document.getElementById(imgSource.id);
                    self.images[imgSource.name] = img;
                    if (img.complete) {
                        imagesLoaded++;
                    } else {
                        img.onload = function() {
                            imagesLoaded++;
                            if (imagesLoaded === numImages) self.init();
                        };
                    }
                }
                if (imagesLoaded === numImages) self.init();
            },
            loadSounds: function() {
                this.audioContext = new AudioContext();
                var resourceTemplate = document.getElementById(this.config.RESOURCE_TEMPLATE_ID).content;
                for (var sound in Runner.sounds) {
                    var soundSrc = resourceTemplate.getElementById(Runner.sounds[sound]).src;
                    soundSrc = soundSrc.substr(soundSrc.indexOf(',') + 1);
                    var buffer = decodeBase64ToArrayBuffer(soundSrc);
                    this.audioContext.decodeAudioData(buffer, function(index, audioData) {
                        this.soundFx[index] = audioData;
                    }.bind(this, sound));
                }
            },
            setSpeed: function(opt_speed) {
                var speed = opt_speed || this.currentSpeed;
                if (this.dimensions.WIDTH < DEFAULT_WIDTH) {
                    var mobileSpeed = speed * this.dimensions.WIDTH / DEFAULT_WIDTH * this.config.MOBILE_SPEED_COEFFICIENT;
                    this.currentSpeed = mobileSpeed > speed ? speed : mobileSpeed;
                } else if (opt_speed) this.currentSpeed = opt_speed;
            },
            init: function() {
                document.querySelector('.' + Runner.classes.ICON).style.visibility = 'hidden';
                this.adjustDimensions();
                this.setSpeed();
                this.containerEl = document.createElement('div');
                this.containerEl.className = Runner.classes.CONTAINER;
                this.canvas = createCanvas(this.containerEl, this.dimensions.WIDTH, this.dimensions.HEIGHT, Runner.classes.PLAYER);
                this.canvasCtx = this.canvas.getContext('2d');
                this.canvasCtx.fillStyle = '#f7f7f7';
                this.canvasCtx.fillRect(0, 0, this.dimensions.WIDTH, this.dimensions.HEIGHT);
                Runner.updateCanvasScaling(this.canvas);
                this.horizon = new Horizon(this.canvas, this.images, this.dimensions, this.config.GAP_COEFFICIENT);
                this.distanceMeter = new DistanceMeter(this.canvas, this.images.TEXT_SPRITE, this.dimensions.WIDTH);
                this.tRex = new Trex(this.canvas, this.images.TREX);
                this.outerContainerEl.appendChild(this.containerEl);
                if (IS_MOBILE) this.createTouchController();
                this.startListening();
                this.update();
                window.addEventListener(Runner.events.RESIZE, this.debounceResize.bind(this));
            },
            createTouchController: function() {
                this.touchController = document.createElement('div');
                this.touchController.className = Runner.classes.TOUCH_CONTROLLER;
            },
            adjustDimensions: function() {
                var containerWidth = this.outerContainerEl.offsetWidth;
                var containerHeight = this.outerContainerEl.offsetHeight;
                var widthScale = containerWidth / this.dimensions.WIDTH;
                var heightScale = containerHeight / this.dimensions.HEIGHT;
                var scale = Math.min(widthScale, heightScale);
                this.dimensions.WIDTH = Math.floor(this.dimensions.WIDTH * scale);
                this.dimensions.HEIGHT = Math.floor(this.dimensions.HEIGHT * scale);
            },
            clearCanvas: function() {
                this.canvasCtx.fillStyle = '#f7f7f7';
                this.canvasCtx.fillRect(0, 0, this.dimensions.WIDTH, this.dimensions.HEIGHT);
            },
            update: function() {
                this.drawPending = false;
                var now = performance.now();
                var deltaTime = now - (this.time || now);
                this.time = now;
                if (this.activated) {
                    this.clearCanvas();
                    if (this.tRex.jumping) this.tRex.updateJump(deltaTime, this.config);
                    this.runningTime += deltaTime;
                    var hasObstacles = this.runningTime > this.config.CLEAR_TIME;
                    if (this.tRex.jumpCount == 1 && !this.playingIntro) {
                        this.playingIntro = true;
                        this.tRex.initJumpAt(this.config.GRAVITY);
                    }
                    if (this.paused) return;
                    this.updateObstacles(deltaTime);
                    this.horizon.update(deltaTime, this.currentSpeed, this.images, hasObstacles);
                    this.tRex.update(deltaTime);
                    this.distanceMeter.update(deltaTime, Math.ceil(this.distanceRan), this.currentSpeed);
                    this.draw();
                    if (!this.crashed) {
                        this.distanceRan += 0.1 * deltaTime * this.currentSpeed / this.msPerFrame;
                        this.currentSpeed += this.config.ACCELERATION;
                        if (!this.crashed) {
                            this.scheduleNextUpdate();
                        }
                    }
                } else {
                    if (this.playingIntro) this.playIntro();
                    else this.scheduleNextUpdate();
                }
            },
            draw: function() {
                this.horizon.draw();
                this.tRex.draw();
                this.distanceMeter.draw();
            },
            playIntro: function() {
                if (!this.activated && !this.crashed) {
                    this.playingIntro = true;
                    this.tRex.initJumpAt(this.config.GRAVITY);
                    this.activated = true;
                } else if (this.crashed) {
                    this.restart();
                }
            },
            restart: function() {
                if (!this.crashed && this.activated) return;
                this.playCount++;
                this.runningTime = 0;
                this.activated = true;
                this.crashed = false;
                this.distanceRan = 0;
                this.currentSpeed = this.config.SPEED;
                this.tRex.reset();
                this.horizon.reset();
                this.distanceMeter.reset(this.highestScore);
                this.clearCanvas();
                this.playingIntro = false;
                this.update();
            },
            scheduleNextUpdate: function() {
                var timeUntilNextUpdate = this.msPerFrame - (performance.now() - this.time);
                timeUntilNextUpdate = Math.max(0, timeUntilNextUpdate);
                this.drawPending = true;
                window.requestAnimationFrame(this.update.bind(this));
            },
            updateObstacles: function(deltaTime) {
                var lowestObstacle = this.horizon.obstacles[0];
                if (lowestObstacle) {
                    var collision = this.tRex.checkForCollision(lowestObstacle);
                    if (collision) {
                        this.crashed = true;
                        this.distanceMeter.drawGameOver();
                        this.tRex.update(100, true);
                        this.playSound(Runner.sounds.HIT);
                        this.scheduleNextUpdate();
                        return;
                    }
                }
            },
            startListening: function() {
                document.addEventListener(Runner.events.KEYDOWN, this);
                document.addEventListener(Runner.events.KEYUP, this);
                if (IS_MOBILE) {
                    this.touchController.addEventListener(Runner.events.TOUCHSTART, this);
                    this.touchController.addEventListener(Runner.events.TOUCHEND, this);
                    this.containerEl.addEventListener(Runner.events.TOUCHSTART, this);
                } else {
                    document.addEventListener(Runner.events.MOUSEDOWN, this);
                    document.addEventListener(Runner.events.MOUSEUP, this);
                }
            },
            stopListening: function() {
                document.removeEventListener(Runner.events.KEYDOWN, this);
                document.removeEventListener(Runner.events.KEYUP, this);
                if (IS_MOBILE) {
                    this.touchController.removeEventListener(Runner.events.TOUCHSTART, this);
                    this.touchController.removeEventListener(Runner.events.TOUCHEND, this);
                    this.containerEl.removeEventListener(Runner.events.TOUCHSTART, this);
                } else {
                    document.removeEventListener(Runner.events.MOUSEDOWN, this);
                    document.removeEventListener(Runner.events.MOUSEUP, this);
                }
            },
            handleEvent: function(e) {
                return (function(fn) { return fn.call(this, e); }).bind(this)(this.keydown || this.keyup || this.onTouchStart || this.onTouchEnd || this.onMouseDown || this.onMouseUp);
            },
            keydown: function(e) {
                e.preventDefault();
                if (e.keyCode == 32 || e.keyCode == 38) {
                    if (!this.crashed && !this.tRex.jumping && !this.activated) {
                        this.activated = true;
                        this.playingIntro = false;
                        this.tRex.startJump(this.currentSpeed);
                    } else if (!this.crashed && !this.tRex.jumping) {
                        this.tRex.startJump(this.currentSpeed);
                    } else if (this.crashed) {
                        this.restart();
                    }
                }
            },
            keyup: function(e) {
                e.preventDefault();
                if (e.keyCode == 38) {
                    this.tRex.setAcceleration(0);
                }
            },
            onMouseDown: function() {
                if (!this.crashed && !this.tRex.jumping && !this.activated) {
                    this.activated = true;
                    this.playingIntro = false;
                    this.tRex.startJump(this.currentSpeed);
                } else if (!this.crashed && !this.tRex.jumping) {
                    this.tRex.startJump(this.currentSpeed);
                } else if (this.crashed) {
                    this.restart();
                }
            },
            onMouseUp: function() {
                this.tRex.setAcceleration(0);
            },
            onTouchStart: function(e) {
                e.preventDefault();
                if (!this.crashed && !this.tRex.jumping && !this.activated) {
                    this.activated = true;
                    this.playingIntro = false;
                    this.tRex.startJump(this.currentSpeed);
                } else if (!this.crashed && !this.tRex.jumping) {
                    this.tRex.startJump(this.currentSpeed);
                } else if (this.crashed) {
                    this.restart();
                }
            },
            onTouchEnd: function(e) {
                e.preventDefault();
                this.tRex.setAcceleration(0);
            },
            playSound: function(sound) {
                if (this.soundFx[sound]) {
                    var source = this.audioContext.createBufferSource();
                    source.buffer = this.soundFx[sound];
                    source.connect(this.audioContext.destination);
                    source.start(0);
                }
            },
            debounceResize: function() {
                if (!this.resizeTimerId_) {
                    this.resizeTimerId_ = window.setTimeout(this.resizeTimerId_.bind(this), 300);
                }
            },
            resizeTimerId_: function() {
                this.resizeTimerId_ = null;
                var resized = Runner.updateCanvasScaling(this.canvas);
                if (resized) {
                    this.horizon.resize(this.dimensions.WIDTH, this.dimensions.HEIGHT);
                    this.distanceMeter.resize(this.dimensions.WIDTH, this.dimensions.HEIGHT);
                }
            },
            onVisibilityChange: function(e) {
                if (document.hidden || document.webkitHidden) {
                    this.paused = true;
                } else {
                    this.paused = false;
                    if (!this.crashed) this.update();
                }
            },
            setPlayCount: function(count) { this.playCount = count; }
        };

        Runner.events = {
            KEYDOWN: 'keydown', KEYUP: 'keyup', MOUSEDOWN: 'mousedown', MOUSEUP: 'mouseup',
            RESIZE: 'resize', BLUR: 'blur', FOCUS: 'focus', VISIBILITY: 'visibilitychange',
            TOUCHSTART: 'touchstart', TOUCHEND: 'touchend'
        };

        Runner.updateCanvasScaling = function(canvas, opt_width, opt_height) {
            var context = canvas.getContext('2d');
            var devicePixelRatio = Math.floor(window.devicePixelRatio) || 1;
            var backingStoreRatio = Math.floor(context.webkitBackingStorePixelRatio) || 1;
            var ratio = devicePixelRatio / backingStoreRatio;
            if (devicePixelRatio !== backingStoreRatio) {
                var oldWidth = opt_width || canvas.width;
                var oldHeight = opt_height || canvas.height;
                canvas.width = oldWidth * ratio;
                canvas.height = oldHeight * ratio;
                canvas.style.width = oldWidth + 'px';
                canvas.style.height = oldHeight + 'px';
                context.scale(ratio, ratio);
                return true;
            }
            return false;
        };

        function Trex(canvas, sprite) {
            this.canvas = canvas;
            this.canvasCtx = canvas.getContext('2d');
            this.spritePos = { x: 0, y: 0 };
            this.xPos = 0;
            this.yPos = 0;
            this.groundYPos = 0;
            this.currentFrame = 0;
            this.currentAnimFrames = null;
            this.blinkDelay = 0;
            this.blinkCount = 0;
            this.animStartTime = 0;
            this.timer = 0;
            this.msPerFrame = 1000 / FPS;
            this.config = Trex.config;
            this.status = Trex.status.WAITING;
            this.jumping = false;
            this.ducking = false;
            this.jumpVelocity = 0;
            this.reachedMinHeight = false;
            this.speedDrop = false;
            this.jumpCount = 0;
            this.jumpspotX = 0;
            this.init(sprite);
        }
        Trex.config = {
            WIDTH: 44, HEIGHT: 47, BIG_WIDTH: 59, BIG_HEIGHT: 64,
            X_POS: 50, Y_POS: 0, GRAVITY: 0.6, JUMP_VELOCITY: -10,
            DROP_VELOCITY: -5, DUCK_JUMP_HEIGHT: 35, SPEED_DROP_COEFFICIENT: 3,
            START_Y_POS: 0
        };
        Trex.status = { WAITING: 'waiting', RUNNING: 'running', JUMPING: 'jumping' };
        Trex.prototype = {
            init: function(sprite) {
                this.sprite = sprite;
                this.groundYPos = Trex.config.START_Y_POS;
                this.xPos = Trex.config.X_POS;
                this.yPos = Trex.config.START_Y_POS;
                this.setBlinkDelay();
                this.draw();
            },
            setBlinkDelay: function() { this.blinkDelay = Math.ceil(Math.random() * 3000); },
            startJump: function() {
                if (!this.jumping) {
                    this.jumping = true;
                    this.jumpVelocity = Trex.config.JUMP_VELOCITY;
                    this.yPos = this.groundYPos;
                    this.reachedMinHeight = false;
                }
            },
            initJumpAt: function() { this.startJump(); },
            updateJump: function(deltaTime, config) {
                var gravity = config.GRAVITY;
                this.yPos += this.jumpVelocity;
                this.jumpVelocity += gravity;
                if (this.yPos > this.groundYPos) {
                    this.jumping = false;
                    this.jumpCount++;
                    this.yPos = this.groundYPos;
                    this.jumpVelocity = 0;
                }
            },
            setAcceleration: function(acc) { this.speedDrop = acc < 0; },
            checkForCollision: function(obstacle) {
                var trexBox = {
                    x: this.xPos + 5,
                    y: this.yPos + 5,
                    width: Trex.config.WIDTH - 10,
                    height: Trex.config.HEIGHT - 10
                };
                var obstacleBox = {
                    x: obstacle.xPos + obstacle.typeConfig.widthPadding,
                    y: obstacle.yPos + obstacle.typeConfig.heightPadding,
                    width: obstacle.width - obstacle.typeConfig.widthPadding * 2,
                    height: obstacle.height - obstacle.typeConfig.heightPadding * 2
                };
                return boxCompare(trexBox, obstacleBox);
            },
            draw: function() {
                var sourceX = this.spritePos.x;
                var sourceY = this.spritePos.y;
                var w = Trex.config.WIDTH;
                var h = Trex.config.HEIGHT;
                this.canvasCtx.drawImage(this.sprite, sourceX, sourceY, w, h, this.xPos, this.yPos, w, h);
            },
            reset: function() {
                this.yPos = Trex.config.START_Y_POS;
                this.jumping = false;
                this.jumpVelocity = 0;
                this.jumpCount = 0;
                this.spritePos = { x: 0, y: 0 };
                this.draw();
            }
        };

        function Horizon(canvas, images, dimensions, gapCoefficient) {
            this.canvas = canvas;
            this.canvasCtx = this.canvas.getContext('2d');
            this.images = images;
            this.dimensions = dimensions;
            this.gapCoefficient = gapCoefficient;
            this.obstacles = [];
            this.clouds = [];
            this.cloudImg = images.CLOUD;
            this.horizonLine = new HorizonLine(this.canvas, this.images.HORIZON);
            this.currentObstacleX = 0;
            this.init();
        }
        Horizon.prototype = {
            init: function() {
                this.horizonLine.init();
                this.draw();
            },
            reset: function() {
                this.obstacles = [];
                this.horizonLine.reset();
            },
            resize: function(width, height) {
                this.canvas.width = width;
                this.canvas.height = height;
            },
            draw: function() {
                this.horizonLine.draw();
                for (var i = 0; i < this.obstacles.length; i++) this.obstacles[i].draw();
                for (var j = 0; j < this.clouds.length; j++) this.clouds[j].draw();
            },
            update: function(deltaTime, currentSpeed, images, hasObstacles) {
                this.horizonLine.update(deltaTime, currentSpeed);
                if (hasObstacles && this.obstacles.length < 1) {
                    this.addObstacle();
                }
                for (var i = this.obstacles.length - 1; i >= 0; i--) {
                    this.obstacles[i].update(deltaTime, currentSpeed);
                    if (this.obstacles[i].remove) this.obstacles.splice(i, 1);
                }
                if (Math.random() < 0.001) this.addCloud();
                for (var j = this.clouds.length - 1; j >= 0; j--) {
                    this.clouds[j].update(deltaTime, currentSpeed);
                    if (this.clouds[j].remove) this.clouds.splice(j, 1);
                }
            },
            addObstacle: function() {
                var obstacleTypes = [
                    { type: 'CACTUS_SMALL', width: 17, height: 35, widthPadding: 3, heightPadding: 3 },
                    { type: 'CACTUS_LARGE', width: 25, height: 50, widthPadding: 4, heightPadding: 4 }
                ];
                var type = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
                var xPos = this.dimensions.WIDTH + Math.random() * 200;
                this.obstacles.push(new Obstacle(this.canvas, this.images[type.type], type, xPos));
            },
            addCloud: function() {
                this.clouds.push(new Cloud(this.canvas, this.cloudImg, this.dimensions.WIDTH));
            }
        };

        function HorizonLine(canvas, sprite) {
            this.canvas = canvas;
            this.canvasCtx = canvas.getContext('2d');
            this.sprite = sprite;
            this.sourceX = 0;
            this.sourceY = 0;
            this.dimensions = { WIDTH: 2400, HEIGHT: 12 };
            this.xPos = 0;
            this.yPos = 125;
            this.sourceWidth = this.dimensions.WIDTH;
            this.sourceHeight = this.dimensions.HEIGHT;
        }
        HorizonLine.prototype = {
            init: function() { this.draw(); },
            reset: function() { this.sourceX = 0; this.draw(); },
            update: function(deltaTime, speed) {
                this.sourceX += speed;
                if (this.sourceX >= this.sourceWidth) this.sourceX = 0;
                this.draw();
            },
            draw: function() {
                this.canvasCtx.drawImage(this.sprite, this.sourceX, this.sourceY, this.dimensions.WIDTH, this.dimensions.HEIGHT, this.xPos, this.yPos, this.dimensions.WIDTH, this.dimensions.HEIGHT);
            }
        };

        function Obstacle(canvas, sprite, typeConfig, xPos) {
            this.canvas = canvas;
            this.canvasCtx = canvas.getContext('2d');
            this.sprite = sprite;
            this.typeConfig = typeConfig;
            this.xPos = xPos;
            this.width = typeConfig.width;
            this.height = typeConfig.height;
            this.yPos = 125 - typeConfig.height;
            this.remove = false;
        }
        Obstacle.prototype = {
            update: function(deltaTime, speed) {
                this.xPos -= speed;
                if (this.xPos + this.width < 0) this.remove = true;
                this.draw();
            },
            draw: function() {
                this.canvasCtx.drawImage(this.sprite, this.xPos, this.yPos, this.width, this.height);
            }
        };

        function Cloud(canvas, sprite, containerWidth) {
            this.canvas = canvas;
            this.canvasCtx = canvas.getContext('2d');
            this.sprite = sprite;
            this.xPos = containerWidth + Math.random() * 200;
            this.yPos = Math.random() * 60 + 10;
            this.width = 46;
            this.height = 14;
            this.remove = false;
        }
        Cloud.prototype = {
            update: function(deltaTime, speed) {
                this.xPos -= speed * 0.2;
                if (this.xPos + this.width < 0) this.remove = true;
                this.draw();
            },
            draw: function() {
                this.canvasCtx.drawImage(this.sprite, this.xPos, this.yPos, this.width, this.height);
            }
        };

        function DistanceMeter(canvas, textSprite, canvasWidth) {
            this.canvas = canvas;
            this.canvasCtx = canvas.getContext('2d');
            this.sprite = textSprite;
            this.canvasWidth = canvasWidth;
            this.xPos = canvasWidth - 60;
            this.yPos = 10;
            this.digits = 0;
            this.currentDistance = 0;
            this.maxScore = 0;
            this.maxScoreChars = 0;
            this.gameOver = false;
        }
        DistanceMeter.prototype = {
            reset: function(highScore) {
                this.digits = 0;
                this.currentDistance = 0;
                this.gameOver = false;
                this.draw();
            },
            update: function(deltaTime, distance, speed) {
                this.currentDistance = distance;
                this.draw();
            },
            draw: function() {
                var distStr = String(Math.floor(this.currentDistance)).padStart(5, '0');
                var charWidth = 10;
                var totalWidth = distStr.length * charWidth;
                var startX = this.canvasWidth - totalWidth - 10;
                for (var i = 0; i < distStr.length; i++) {
                    var digit = parseInt(distStr[i]);
                    var sx = digit * 10;
                    this.canvasCtx.drawImage(this.sprite, sx, 0, 10, 14, startX + i * charWidth, this.yPos, 10, 14);
                }
            },
            drawGameOver: function() {
                this.gameOver = true;
                var text = 'GAME OVER';
                var charWidth = 10;
                var totalWidth = text.length * charWidth;
                var startX = (this.canvasWidth - totalWidth) / 2;
                var spriteChars = 'GAMEOVR';
                for (var i = 0; i < text.length; i++) {
                    var char = text[i];
                    var idx = spriteChars.indexOf(char);
                    if (idx >= 0) {
                        this.canvasCtx.drawImage(this.sprite, idx * 10, 14, 10, 14, startX + i * charWidth, this.yPos + 30, 10, 14);
                    }
                }
            },
            resize: function(width, height) {
                this.canvasWidth = width;
                this.xPos = width - 60;
            }
        };

        function createCanvas(container, width, height, opt_classname) {
            var canvas = document.createElement('canvas');
            canvas.className = opt_classname ? Runner.classes.CANVAS + ' ' + opt_classname : Runner.classes.CANVAS;
            canvas.width = width;
            canvas.height = height;
            container.appendChild(canvas);
            return canvas;
        }

        function decodeBase64ToArrayBuffer(base64String) {
            var len = (base64String.length / 4) * 3;
            var str = atob(base64String);
            var arrayBuffer = new ArrayBuffer(len);
            var bytes = new Uint8Array(arrayBuffer);
            for (var i = 0; i < len; i++) bytes[i] = str.charCodeAt(i);
            return bytes.buffer;
        }

        function boxCompare(a, b) {
            return a.x < b.x + b.width && a.x + a.width > b.x && a.y < b.y + b.height && a.y + a.height > b.y;
        }

        new Runner('.interstitial-wrapper');
    })();
    </script>
